# Martin tile server config — Magnum
#
# Apply martin-tiles.sql to the database before starting Martin:
#   docker compose -f docker/docker-compose.yml exec postgres \
#     psql -U magnum -d magnum -f /docker/martin-tiles.sql
#
# Or run it from the host against the published port:
#   psql $DATABASE_URL -f docker/martin-tiles.sql
#
# Martin reads SQL functions in the public schema and exposes them at
# /{function_name}/{z}/{x}/{y}. It supports the MVT (Mapbox Vector Tile)
# spec out of the box. The four functions in martin-tiles.sql produce:
#   /trails/{z}/{x}/{y}     - trail lines, colored by surface_type
#   /segments/{z}/{x}/{y}   - segment lines with hazard flags
#   /systems/{z}/{x}/{y}    - system centroids (for now; switch to polygons in Phase 2)
#   /features/{z}/{x}/{y}   - feature points tagged by type_tag
#
# Martin env (set in docker-compose.yml):
#   DATABASE_URL  postgres connection
#   Martin watches the public schema by default.
#
# See https://maplibre.org/martin/configuratml for advanced options.
