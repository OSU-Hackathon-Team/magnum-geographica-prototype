# Martin tile server config — Magnum
#
# Server started with:  martin --config /etc/martin.yaml
# See https://maplibre.org/martin/configuration

postgres:
  connection_string: ${DATABASE_URL}
  auto_publish:
    tables: false
    functions: false
  functions:
    super_systems:
      schema: public
      function: super_systems
    systems:
      schema: public
      function: systems
    trails:
      schema: public
      function: trails
    segments:
      schema: public
      function: segments
    features:
      schema: public
      function: features
    traces_heatmap:
      schema: public
      function: traces_heatmap

mbtiles:
  paths: /data
  sources:
    basemap: /data/basemap.mbtiles

pmtiles:
  paths: /data
