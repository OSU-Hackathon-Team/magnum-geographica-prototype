<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.3.1/ol.css" />
    <style>
      html, body, #map { margin: 0; padding: 0; width: 100%; height: 100%; background: #e8e8e8; }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script src="https://cdn.jsdelivr.net/npm/ol@10.3.1/dist/ol.js"></script>
    <script>
      var map, vectorLayers, vectorSources, highlightedId = null, liveRouteSource = null;

      function postToRN(event) {
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(JSON.stringify(event));
        }
      }

      function baseStyle() {
        return new ol.style.Style({
          stroke: new ol.style.Stroke({ color: '#8B4513', width: 3 })
        });
      }

      function highlightStyle() {
        return new ol.style.Style({
          stroke: new ol.style.Stroke({ color: '#22c55e', width: 5 })
        });
      }

      function applyHighlight() {
        if (!vectorSources || !vectorSources.trails) return;
        var src = vectorSources.trails;
        src.forEachFeature(function (f) {
          if (highlightedId && f.get('id') === highlightedId) {
            f.setStyle(highlightStyle());
          } else {
            f.setStyle(baseStyle());
          }
        });
      }

      function buildMap(opts) {
        var initialCenter = (opts && opts.center) || [-82.9988, 39.9612];
        var initialZoom = (opts && opts.zoom) || 6;
        var martinUrl = (opts && opts.martinUrl) || null;

        vectorLayers = {};
        vectorSources = {};

        var layers = [
          new ol.layer.Tile({ source: new ol.source.OSM() })
        ];

        if (martinUrl) {
          var trailsSource = new ol.source.VectorTile({
            format: new ol.format.MVT(),
            url: martinUrl + '/trails/{z}/{x}/{y}'
          });
          vectorSources.trails = trailsSource;
          vectorLayers.trails = new ol.layer.VectorTile({
            source: trailsSource,
            style: baseStyle
          });
          layers.push(vectorLayers.trails);
        }

        map = new ol.Map({
          target: 'map',
          layers: layers,
          view: new ol.View({ center: ol.proj.fromLonLat(initialCenter), zoom: initialZoom })
        });

        // Live recording route — a separate vector layer that the
        // recording screen drives via setLiveRoute. Stays on top so
        // the in-progress polyline is always visible above the base
        // map. Style: 4px green line with a small dot at the tail.
        liveRouteSource = new ol.source.Vector();
        var liveRouteStyle = function (feature) {
          var coords = feature.getGeometry().getCoordinates();
          var styles = [
            new ol.style.Style({
              stroke: new ol.style.Stroke({ color: '#22c55e', width: 4, lineCap: 'round' })
            })
          ];
          if (coords.length > 0) {
            var tail = coords[coords.length - 1];
            styles.push(
              new ol.style.Style({
                geometry: new ol.geom.Point(tail),
                image: new ol.style.Circle({
                  radius: 6,
                  fill: new ol.style.Fill({ color: '#22c55e' }),
                  stroke: new ol.style.Stroke({ color: '#fff', width: 2 })
                })
              })
            );
          }
          return styles;
        };
        vectorLayers.liveRoute = new ol.layer.Vector({
          source: liveRouteSource,
          style: liveRouteStyle
        });
        // Insert just above the base layer so the line is always
        // visible but doesn't cover feature pins.
        map.addLayer(vectorLayers.liveRoute);

        map.on('click', function (evt) {
          var c = ol.proj.toLonLat(evt.coordinate);
          postToRN({ type: 'mapClick', lon: c[0], lat: c[1] });
        });

        map.on('moveend', function () {
          var v = map.getView();
          var c = ol.proj.toLonLat(v.getCenter());
          postToRN({ type: 'moveEnd', center: c, zoom: v.getZoom() });
        });
      }

      window.olBridge = {
        init: function (opts) {
          buildMap(opts || {});
          postToRN({ type: 'ready' });
        },
        setViewport: function (args) {
          if (!map) return;
          map.getView().setCenter(ol.proj.fromLonLat(args.center));
          if (typeof args.zoom === 'number') map.getView().setZoom(args.zoom);
        },
        flyTo: function (args) {
          if (!map) return;
          map.getView().animate({
            center: ol.proj.fromLonLat([args.lon, args.lat]),
            zoom: args.zoom || map.getView().getZoom(),
            duration: 500
          });
        },
        setTrails: function (args) {
          if (!vectorSources || !vectorSources.trails) return;
          var features = (new ol.format.GeoJSON()).readFeatures(args.geojson, {
            featureProjection: 'EPSG:3857'
          });
          vectorSources.trails.clear();
          vectorSources.trails.addFeatures(features);
          applyHighlight();
        },
        setSystems: function (args) {
          if (!vectorSources || !vectorSources.systems) return;
          var features = (new ol.format.GeoJSON()).readFeatures(args.geojson, {
            featureProjection: 'EPSG:3857'
          });
          vectorSources.systems.clear();
          vectorSources.systems.addFeatures(features);
        },
        setFeatures: function (args) {
          if (!vectorSources || !vectorSources.features) return;
          var features = (new ol.format.GeoJSON()).readFeatures(args.geojson, {
            featureProjection: 'EPSG:3857'
          });
          vectorSources.features.clear();
          vectorSources.features.addFeatures(features);
        },
        highlightTrail: function (args) {
          highlightedId = args && args.id;
          applyHighlight();
        },
        setLiveRoute: function (args) {
          if (!map || !liveRouteSource) return;
          var coords = (args && args.coordinates) || [];
          if (coords.length < 2) {
            liveRouteSource.clear();
            return;
          }
          var projected = coords.map(function (c) { return ol.proj.fromLonLat(c); });
          var line = new ol.geom.LineString(projected);
          var feature = new ol.Feature({ geometry: line });
          liveRouteSource.clear();
          liveRouteSource.addFeature(feature);
          // Follow mode: pan the map so the tail of the polyline is
          // visible. We don't auto-zoom — the recorder picks the
          // zoom. If the user pans manually we honor that until a
          // new follow point arrives; this is the same "soft follow"
          // pattern most GPS apps use.
          if (typeof args.followLon === 'number' && typeof args.followLat === 'number') {
            map.getView().animate({
              center: ol.proj.fromLonLat([args.followLon, args.followLat]),
              duration: 250
            });
          }
        },
        clearLiveRoute: function () {
          if (liveRouteSource) liveRouteSource.clear();
        }
      };

      window.addEventListener('error', function (e) {
        postToRN({ type: 'error', message: e.message });
      });
    </script>
  </body>
</html>
